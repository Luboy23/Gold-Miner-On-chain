[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = []
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "./out" },
  { access = "read", path = "./config/ranked-levels.json" },
  { access = "read", path = "../frontend/public/ranked-level-manifest.json" }
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
quote_style = "double"
